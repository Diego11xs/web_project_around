        <template id="card-template">
          <div class="elements__element">
            <button class="elements__delete-button"></button>
            <img class="elements__image" />
            <div class="elements__title">
              <h2 class="elements__name"></h2>
              <button class="elements__like-button"></button>
            </div>
          </div>
        </template>
      </main>
      <footer class="footer">
        <p class="footer__copyright">© 2025 Around The U.S.</p>
      </footer>
    </div>

    <!-- Popups will go here -->
    <div class="popup popup__profile">
      <div class="popup__container">
        <button class="popup__close-button"></button>
        <h2 class="popup__title">Editar perfil</h2>
        <form class="popup__form">
          <input
            class="popup__input"
            id="name-input"
            type="text"
            placeholder="Nombre"
          />
          <input
            class="popup__input"
            id="ocupation-input"
            type="text"
            placeholder="Acerca de mí"
          />
          <button class="popup__save-button" type="submit">Guardar</button>
        </form>
      </div>
    </div>

    <!-- Popup New Place -->
    <div class="popup popup__newplace">
      <div class="popup__container popup__container-newplace">
        <button class="popup__newplace-closebtn"></button>
        <h2 class="popup__newplace-title">Nuevo Lugar</h2>
        <form class="popup__newplace-form">
          <input
            class="popup__newplace-input"
            id="newplace-input"
            type="text"
            placeholder="Titulo"
          />
          <input
            class="popup__newplace-input"
            id="newplace-url-input"
            type="text"
            placeholder="Enlace a la imagen"
          />
          <button class="popup__newplace-createbtn" type="submit">Crear</button>
        </form>
      </div>
    </div>

    <!-- Popup Image Preview -->
    <div class="popup popup__image-preview">
      <div class="popup__container popup__container-preview">
        <button class="popup__preview-close"></button>

        <div class="popup__image-frame">
          <img class="popup__preview-image" />
        </div>

        <p class="popup__preview-caption"></p>
      </div>
    </div>
