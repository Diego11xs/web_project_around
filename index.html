<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Proyect around - Sprint 7" />
    <meta name="author" content="Diego Granados" />
    <meta name="keywords" content="HTML, CSS, JavaScript, Sprint_7" />
    <title>Around The U.S.</title>
    <link rel="stylesheet" href="./index.css" />
  </head>

  <body>
    <div class="page">
      <header class="header">
        <div class="logo">
          <img
            src="./images/Logo.png"
            alt="Logo Around the U.S."
            class="logo__image"
          />
        </div>
      </header>

      <main class="content">
        <section class="profile">
          <img
            class="profile__avatar"
            src="./images/profile.png"
            alt="Jacques Cousteau"
          />

          <div class="profile__info">
            <div class="profile__info-container">
              <h1 class="profile__name">Jacques Cousteau</h1>
              <button class="profile__edit-button">
                <img src="./images/editar.png" alt="botton editar" />
              </button>
            </div>
            <h2 class="profile__occupation">Explorador</h2>
          </div>

          <button class="profile__add-button">
            <img src="./images/add-button.png" alt="botton agregar" />
          </button>
        </section>

        <section class="elements">
          <div class="elements__element">
            <img
              src="./images/yosemite.jpg"
              alt="valle de yosemite"
              class="element__image"
            />
            <div class="element__title">
              <h2 class="element__name">Valle Yosemite</h2>
              <button class="element__like-button"></button>
            </div>
          </div>

          <div class="elements__element">
            <img
              src="./images/louise.jpg"
              alt="valle de yosemite"
              class="element__image"
            />
            <div class="element__title">
              <h2 class="element__name">Lago Louise</h2>
              <button class="element__like-button"></button>
            </div>
          </div>

          <div class="elements__element">
            <img
              src="./images/calvas.jpg"
              alt="valle de yosemite"
              class="element__image"
            />
            <div class="element__title">
              <h2 class="element__name">Montañas Calvas</h2>
              <button class="element__like-button"></button>
            </div>
          </div>

          <div class="elements__element">
            <img
              src="./images/latemar.jpg"
              alt="valle de yosemite"
              class="element__image"
            />
            <div class="element__title">
              <h2 class="element__name">Latemar</h2>
              <button class="element__like-button"></button>
            </div>
          </div>

          <div class="elements__element">
            <img
              src="./images/vanois.jpg"
              alt="valle de yosemite"
              class="element__image"
            />
            <div class="element__title">
              <h2 class="element__name">Vanois National</h2>
              <button class="element__like-button"></button>
            </div>
          </div>

          <div class="elements__element">
            <img
              src="./images/braies.png"
              alt="valle de yosemite"
              class="element__image"
            />
            <div class="element__title">
              <h2 class="element__name">Lago Di Braies</h2>
              <button class="element__like-button"></button>
            </div>
          </div>
        </section>
      </main>
      <footer class="footer">
        <p class="footer__copyright">© 2025 Around The U.S.</p>
      </footer>
    </div>

    <!-- Popups will go here -->
    <div class="popup">
      <div class="popup__container">
        <button class="popup__close-button"></button>
        <h2 class="popup__title">Editar perfil</h2>
        <form class="popup__form">
          <input
            class="popup__input"
            id="name-input"
            type="text"
            placeholder="Nombre"
          />
          <input
            class="popup__input"
            id="ocupation-input"
            type="text"
            placeholder="Acerca de mí"
          />
          <button class="popup__save-button" type="submit">Guardar</button>
        </form>
      </div>
    </div>
    <script src="./scripts/index.js"></script>
  </body>
</html>
